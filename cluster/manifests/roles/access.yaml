apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: access-role
  namespace: demo-namespace
rules:
  - apiGroups: [""]
    resources: ["services", "pods/exec", "pods/portforward"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: access-rolebinding
  namespace: demo-namespace
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: oidc:access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: access-role
