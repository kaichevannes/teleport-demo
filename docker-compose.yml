services:
  idp:
    image: ghcr.io/soluto/oidc-server-mock:0.12.1
    container_name: demo-idp
    ports:
      - 8080:80
      - 8443:443
    environment:
      ASPNETCORE_URLS: https://+:443;http://+:80
      ASPNETCORE_Kestrel__Certificates__Default__Password: pfx-password
      ASPNETCORE_Kestrel__Certificates__Default__Path: /tmp/config/private-certificate.pfx
      SERVER_OPTIONS_PATH: /tmp/config/server.yaml
      USERS_CONFIGURATION_PATH: /tmp/config/users.yaml
      CLIENTS_CONFIGURATION_PATH: /tmp/config/clients.yaml
    volumes:
      - ./idp/certs/private-certificate.pfx:/tmp/config/private-certificate.pfx
      - ./idp/server.yaml:/tmp/config/server.yaml
      - ./idp/users.yaml:/tmp/config/users.yaml
      - ./idp/clients.yaml:/tmp/config/clients.yaml

  # Adapted from
  # https://docs.k3s.io/advanced#running-k3s-in-docker
  # https://github.com/k3s-io/k3s/blob/main/docker-compose.yml
  cluster:
    image: rancher/k3s:v1.35.2-k3s1
    container_name: demo-cluster
    hostname: demo-cluster
    network_mode: host
    command: >
      server
      --kube-apiserver-arg=oidc-issuer-url=https://localhost:8443
      --kube-apiserver-arg=oidc-client-id=authorization-code-mock-client
      --kube-apiserver-arg=oidc-username-claim=name
      --kube-apiserver-arg=oidc-username-prefix=-
      --kube-apiserver-arg=oidc-ca-file=/tmp/config/public-certificate.pem
    privileged: true
    tmpfs:
      # k3s expects these directories to be tmpfs (in memory)
      - /run
      - /var/run
    volumes:
      - ./idp/certs/public-certificate.pem:/tmp/config/public-certificate.pem
      # k3s recursively watches /var/lib/rancher/k3s/server/manifests and
      # automatically applies all manifest files.
      # 
      # Bind to /custom to avoid copying built-in k3s manifests back to the
      # local manifest folder.
      - ./cluster/manifests:/var/lib/rancher/k3s/server/manifests/custom

  user:
    build:
      # Context at root because we copy the cert from ./idp
      context: .
      dockerfile: ./user/Dockerfile
    container_name: demo-user
    network_mode: host
    volumes:
      - ./kubeconfig.yaml:/root/.kube/config
