apiVersion: v1
kind: Config
preferences: {}

clusters:
  - cluster:
      insecure-skip-tls-verify: true
      # certificate-authority: /cluster-certs/server-ca.crt
      server: https://localhost:6443
    name: demo-cluster

contexts:
